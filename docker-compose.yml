version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - local_sqlite_data:/app/db # SQLiteファイルの永続化
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/analytics
      - OLLAMA_HOST=http://host.docker.internal:11434
      - OLLAMA_MODEL=gemma2:9b # もしくは llama3, mistral 等
    extra_hosts:
      - "host.docker.internal:host-gateway" # コンテナ内からホストマシンのOllama APIへアクセスするため
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  local_sqlite_data:
